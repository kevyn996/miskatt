<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Para ti · Un regalo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Petit+Formal+Script&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #f0c040;
  --amber: #e8a020;
  --cream: #FDF5EC;
  --blush: #F2C4A0;
  --rose: #D4607A;
  --deep-left: #0d0d08;
  --deep-right: #1A0A20;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #060408;
  font-family: 'Cormorant Garamond', serif;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── OVERLAY DE TRANSICIÓN ── */
#transition-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  background: #000;
  transition: opacity 0.7s ease;
}
#transition-overlay.fade-out { opacity: 1; pointer-events: all; }

/* ── CONTENEDOR PRINCIPAL ── */
.portal {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: row;
  position: relative;
}

/* ── SEPARADOR CENTRAL ── */
.divider {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 1px;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(255,255,255,0.06) 20%,
    rgba(255,255,255,0.12) 50%,
    rgba(255,255,255,0.06) 80%,
    transparent 100%);
  z-index: 10;
  transition: opacity 0.5s ease;
}

.divider-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 48px; height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
  z-index: 11;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  color: rgba(255,255,255,0.3);
  pointer-events: none;
  animation: breathe 3s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
}

/* ── PANEL BASE ── */
.panel {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: flex 0.8s cubic-bezier(0.77, 0, 0.18, 1);
}

/* ── PANEL IZQUIERDO (Flores Amarillas) ── */
.panel-left {
  background:
    radial-gradient(ellipse 70% 80% at 40% 60%, rgba(240,192,64,0.12) 0%, transparent 65%),
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(20,48,8,0.8) 0%, transparent 60%),
    linear-gradient(135deg, #0d1208 0%, #0b1a06 40%, #0d0d08 100%);
}

/* ── PANEL DERECHO (Feriado) ── */
.panel-right {
  background:
    radial-gradient(ellipse 70% 80% at 60% 60%, rgba(212,96,122,0.12) 0%, transparent 65%),
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(139,48,80,0.4) 0%, transparent 60%),
    linear-gradient(135deg, #1A0A20 0%, #2C1020 40%, #1A0810 100%);
}

/* ── HOVER EXPAND ── */
.portal:has(.panel-left:hover) .panel-left { flex: 1.35; }
.portal:has(.panel-left:hover) .panel-right { flex: 0.65; }
.portal:has(.panel-right:hover) .panel-right { flex: 1.35; }
.portal:has(.panel-right:hover) .panel-left { flex: 0.65; }

/* ── OVERLAY DE HOVER ── */
.panel::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}

.panel-left::after {
  background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(240,192,64,0.06) 0%, transparent 70%);
}

.panel-right::after {
  background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(212,96,122,0.06) 0%, transparent 70%);
}

.panel:hover::after { opacity: 1; }

/* ── CANVAS PARTÍCULAS ── */
.panel-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ── CONTENIDO DEL PANEL ── */
.panel-content {
  position: relative;
  z-index: 5;
  text-align: center;
  padding: 2rem 1.5rem;
  max-width: 340px;
  width: 100%;
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
}

.panel:hover .panel-content {
  transform: translateY(-6px);
}

/* ── ICONO GRANDE ── */
.panel-icon {
  font-size: clamp(3rem, 8vw, 5.5rem);
  display: block;
  margin-bottom: 1.2rem;
  animation: floatIcon 4s ease-in-out infinite;
  filter: drop-shadow(0 0 20px currentColor);
  line-height: 1;
}

.panel-left .panel-icon { animation-delay: 0s; }
.panel-right .panel-icon { animation-delay: -2s; }

@keyframes floatIcon {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-10px) rotate(3deg); }
}

/* ── ETIQUETA SUPERIOR ── */
.panel-label {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: clamp(7px, 1.5vw, 9px);
  letter-spacing: 0.45em;
  text-transform: uppercase;
  margin-bottom: 0.8rem;
  opacity: 0.45;
}

.panel-left .panel-label { color: var(--amber); }
.panel-right .panel-label { color: var(--blush); }

/* ── TÍTULO ── */
.panel-title {
  font-family: 'Petit Formal Script', cursive;
  font-size: clamp(1.6rem, 4vw, 2.8rem);
  line-height: 1.2;
  margin-bottom: 0.6rem;
}

.panel-left .panel-title { color: var(--gold); text-shadow: 0 0 30px rgba(240,192,64,0.5); }
.panel-right .panel-title { color: var(--blush); text-shadow: 0 0 30px rgba(212,96,122,0.5); }

/* ── DESCRIPCIÓN ── */
.panel-desc {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  line-height: 1.7;
  margin-bottom: 1.8rem;
  opacity: 0.65;
}

.panel-left .panel-desc { color: rgba(240,192,64,0.7); }
.panel-right .panel-desc { color: rgba(242,196,160,0.7); }

/* ── BOTÓN CTA ── */
.panel-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: clamp(7.5px, 1.6vw, 9.5px);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  padding: 0.75rem 1.8rem;
  border-radius: 50px;
  border: 1px solid;
  background: transparent;
  cursor: pointer;
  transition: all 0.4s ease;
  opacity: 0.55;
}

.panel:hover .panel-btn { opacity: 1; }

.panel-left .panel-btn {
  color: var(--gold);
  border-color: rgba(240,192,64,0.3);
}

.panel-left .panel-btn:hover {
  background: rgba(240,192,64,0.1);
  border-color: rgba(240,192,64,0.7);
  box-shadow: 0 0 20px rgba(240,192,64,0.2);
}

.panel-right .panel-btn {
  color: var(--blush);
  border-color: rgba(242,196,160,0.3);
}

.panel-right .panel-btn:hover {
  background: rgba(242,196,160,0.08);
  border-color: rgba(242,196,160,0.6);
  box-shadow: 0 0 20px rgba(212,96,122,0.2);
}

/* ── LÍNEA ORNAMENTAL ── */
.panel-orn {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin-bottom: 1rem;
}

.orn-line {
  width: 40px; height: 1px;
  opacity: 0.3;
}

.panel-left .orn-line {
  background: linear-gradient(to right, transparent, var(--amber));
}
.panel-left .orn-line.r {
  background: linear-gradient(to left, transparent, var(--amber));
}

.panel-right .orn-line {
  background: linear-gradient(to right, transparent, var(--rose));
}
.panel-right .orn-line.r {
  background: linear-gradient(to left, transparent, var(--rose));
}

.orn-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  opacity: 0.6;
}

.panel-left .orn-dot { background: var(--gold); }
.panel-right .orn-dot { background: var(--rose); }

/* ── TAGLINE EN LA ESQUINA ── */
.panel-corner {
  position: absolute;
  bottom: clamp(1rem, 3vh, 2rem);
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: clamp(6.5px, 1.2vw, 8px);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0;
  white-space: nowrap;
  transition: opacity 0.4s ease;
  pointer-events: none;
}

.panel:hover .panel-corner { opacity: 0.3; }
.panel-left .panel-corner { color: var(--amber); }
.panel-right .panel-corner { color: var(--blush); }

/* ── ENTRADA INICIAL ── */
.panel-content {
  opacity: 0;
  transform: translateY(30px);
  animation: panelIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.panel-left .panel-content { animation-delay: 0.4s; }
.panel-right .panel-content { animation-delay: 0.7s; }

@keyframes panelIn {
  to { opacity: 1; transform: translateY(0); }
}

/* ── MENSAJE SUPERIOR ── */
.top-msg {
  position: fixed;
  top: clamp(12px, 2.5vh, 20px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: clamp(7px, 1.4vw, 9px);
  letter-spacing: 0.45em;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  animation: fadeIn 2s ease forwards 1.2s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 600px) {
  .portal { flex-direction: column; }
  .divider {
    top: 50%; bottom: auto;
    left: 0; right: 0;
    width: 100%; height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,255,255,0.06) 20%,
      rgba(255,255,255,0.12) 50%,
      rgba(255,255,255,0.06) 80%,
      transparent 100%);
  }
  .divider-glow { top: 50%; left: 50%; }

  .portal:has(.panel-left:hover) .panel-left { flex: 1.3; }
  .portal:has(.panel-left:hover) .panel-right { flex: 0.7; }
  .portal:has(.panel-right:hover) .panel-right { flex: 1.3; }
  .portal:has(.panel-right:hover) .panel-left { flex: 0.7; }

  .panel-icon { font-size: clamp(2.5rem, 10vw, 3.5rem); }
  .panel-title { font-size: clamp(1.4rem, 5vw, 2rem); }
  .panel-content { max-width: 280px; padding: 1.5rem 1rem; }
}

@media (max-width: 380px) {
  .panel-desc { display: none; }
  .panel-orn { display: none; }
}
</style>
</head>
<body>

<div id="transition-overlay"></div>

<p class="top-msg">✦ &nbsp; elige un momento &nbsp; ✦</p>

<div class="portal">

  <!-- PANEL IZQUIERDO: Flores Amarillas -->
  <div class="panel panel-left" onclick="goTo('cumple.html')">
    <canvas class="panel-canvas" id="canvas-left"></canvas>

    <div class="panel-content">
      <span class="panel-label">21 de Marzo · Día de las Flores</span>
      <span class="panel-icon">🌻</span>
      <h2 class="panel-title">Para ti, mi flor</h2>
      <div class="panel-orn">
        <div class="orn-line"></div>
        <div class="orn-dot"></div>
        <div class="orn-line r"></div>
      </div>
      <p class="panel-desc">Una parte de mi para tí, para un día especial.</p>
      <button class="panel-btn" onclick="event.stopPropagation(); goTo('cumple.html')">
        ✿ &nbsp; Abrir
      </button>
    </div>

    <span class="panel-corner">toca para entrar</span>
  </div>

  <!-- DIVISOR -->
  <div class="divider"></div>
  <div class="divider-glow">✦</div>

  <!-- PANEL DERECHO: Debería Ser Feriado -->
  <div class="panel panel-right" onclick="goTo('feriado.html')">
    <canvas class="panel-canvas" id="canvas-right"></canvas>

    <div class="panel-content">
      <span class="panel-label">Rawayana · Debería Ser Feriado</span>
      <span class="panel-icon">🌅</span>
      <h2 class="panel-title">Deberías ser feriado</h2>
      <div class="panel-orn">
        <div class="orn-line"></div>
        <div class="orn-dot"></div>
        <div class="orn-line r"></div>
      </div>
      <p class="panel-desc">Un atardecer en palabras, una carta desde el lugar más honesto que conozco.</p>
      <button class="panel-btn" onclick="event.stopPropagation(); goTo('feriado.html')">
        ♡ &nbsp; Abrir
      </button>
    </div>

    <span class="panel-corner">toca para entrar</span>
  </div>

</div>

<script>
// ── TRANSICIÓN ──────────────────────────────────────────────────
function goTo(url) {
  const overlay = document.getElementById('transition-overlay');
  overlay.classList.add('fade-out');
  setTimeout(() => { window.location.href = url; }, 700);
}

// ── PARTÍCULAS PANEL IZQUIERDO (doradas / flores) ────────────────
(function() {
  const canvas = document.getElementById('canvas-left');
  const ctx = canvas.getContext('2d');
  const panel = canvas.parentElement;
  const particles = [];

  function resize() {
    canvas.width = panel.offsetWidth;
    canvas.height = panel.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class P {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = Math.random() * canvas.width;
      this.y = init ? Math.random() * canvas.height : canvas.height + 10;
      this.size = 2 + Math.random() * 5;
      this.vy = -(0.15 + Math.random() * 0.4);
      this.vx = (Math.random() - 0.5) * 0.3;
      this.op = 0;
      this.maxOp = 0.08 + Math.random() * 0.15;
      this.fin = true;
      this.shape = Math.random() > 0.6 ? 'petal' : 'dot';
    }
    update() {
      this.y += this.vy; this.x += this.vx + Math.sin(this.y * 0.015) * 0.25;
      if (this.fin) { this.op += 0.004; if (this.op >= this.maxOp) this.fin = false; }
      else this.op -= 0.0015;
      if (this.y < -10 || this.op <= 0) this.reset(false);
    }
    draw() {
      ctx.save(); ctx.globalAlpha = Math.max(0, this.op);
      if (this.shape === 'petal') {
        ctx.fillStyle = `rgba(240, 192, 64, ${this.op})`;
        ctx.translate(this.x, this.y);
        ctx.beginPath();
        ctx.ellipse(0, -this.size * 0.5, this.size * 0.4, this.size, Math.PI * 0.15, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = `rgba(255, 224, 100, ${this.op})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  for (let i = 0; i < 25; i++) particles.push(new P());

  (function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  })();
})();

// ── PARTÍCULAS PANEL DERECHO (corazones / rosa) ──────────────────
(function() {
  const canvas = document.getElementById('canvas-right');
  const ctx = canvas.getContext('2d');
  const panel = canvas.parentElement;
  const particles = [];

  function resize() {
    canvas.width = panel.offsetWidth;
    canvas.height = panel.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class P {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = Math.random() * canvas.width;
      this.y = init ? Math.random() * canvas.height : canvas.height + 10;
      this.size = 3 + Math.random() * 7;
      this.vy = -(0.15 + Math.random() * 0.4);
      this.vx = (Math.random() - 0.5) * 0.3;
      this.op = 0;
      this.maxOp = 0.07 + Math.random() * 0.14;
      this.fin = true;
      this.shape = Math.random() > 0.5 ? 'heart' : 'dot';
      this.col = Math.random() > 0.5 ? `rgba(212, 96, 122,` : `rgba(245, 200, 66,`;
    }
    update() {
      this.y += this.vy; this.x += this.vx + Math.sin(this.y * 0.015) * 0.25;
      if (this.fin) { this.op += 0.004; if (this.op >= this.maxOp) this.fin = false; }
      else this.op -= 0.0015;
      if (this.y < -10 || this.op <= 0) this.reset(false);
    }
    draw() {
      ctx.save(); ctx.globalAlpha = Math.max(0, this.op);
      if (this.shape === 'heart') {
        ctx.fillStyle = this.col + this.op + ')';
        const s = this.size * 0.75;
        ctx.translate(this.x, this.y);
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.3);
        ctx.bezierCurveTo(s * 0.5, -s * 0.9, s, -s * 0.1, 0, s * 0.6);
        ctx.bezierCurveTo(-s, -s * 0.1, -s * 0.5, -s * 0.9, 0, -s * 0.3);
        ctx.fill();
      } else {
        ctx.fillStyle = this.col + this.op + ')';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  for (let i = 0; i < 25; i++) particles.push(new P());

  (function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
